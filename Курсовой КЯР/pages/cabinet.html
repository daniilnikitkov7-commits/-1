<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | JobService</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Стили из папки SCSS (корень проекта) -->
    <link rel="stylesheet" href="../SCSS/main.css">
    <link rel="stylesheet" href="../SCSS/cabinet.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container header-container">
                <a href="../Главная.html" class="logo">
    <img src="../logo.svg" alt="JobService" width="140" height="32">
</a>
                <nav class="nav">
                    <a href="vacancies/catalog.html" class="nav-link">Вакансии</a>
                    <a href="candidates/catalog.html" class="nav-link">Резюме</a>
                    <a href="services.html" class="nav-link">Услуги</a>
                    <a href="contacts.html" class="nav-link">Контакты</a>
                </nav>
                <div class="header-actions">
                    <a href="cabinet.html" class="button button-outline">Разместить</a>
                    <a href="cabinet.html" class="button button-primary">Войти</a>
                </div>
                <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div id="loginBox" class="login-container">
                    <div class="login-card">
                        <h2><i class="fas fa-sign-in-alt"></i> Вход в личный кабинет</h2>
                        <form id="loginForm">
                            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="ivan@mail.ru" required></div>
                            <div class="form-group"><label>Пароль</label><input type="password" id="password" placeholder="123" required></div>
                            <div id="errorMsg" class="error-msg"></div>
                            <button type="submit" class="button button-primary button-block">Войти</button>
                        </form>
                        <div class="test-accounts">
                            <p>Тестовые данные:</p>
                            <p><code>ivan@mail.ru</code> / <code>123</code> — Соискатель</p>
                            <p><code>admin@jobservice.by</code> / <code>admin</code> — Администратор</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container"><div class="footer-bottom"><p>© 2026 JobService. Все права защищены.</p></div></div>
        </footer>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
