<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь | JobService</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../SCSS/main.css">
    <link rel="stylesheet" href="../SCSS/pages.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container header-container">
                <a href="../Главная.html" class="logo">
                    <img src="../logo.svg" alt="JobService" width="140" height="32">
                </a>
                <nav class="nav">
                    <a href="vacancies/catalog.html" class="nav-link">Вакансии</a>
                    <a href="candidates/catalog.html" class="nav-link">Резюме</a>
                    <a href="services.html" class="nav-link">Услуги</a>
                    <a href="contacts.html" class="nav-link">Контакты</a>
                </nav>
                <div class="header-actions">
                    <a href="cabinet.html" class="button button-outline">Разместить</a>
                    <a href="cabinet.html" class="button button-primary">Войти</a>
                </div>
                <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="page-container" style="max-width: 600px;">
                    <div class="page-header">
                        <h1>Обратная связь</h1>
                        <p>Задайте вопрос или оставьте отзыв</p>
                    </div>
                    <div class="feedback-form">
                        <form>
                            <div class="form-group"><label>Ваше имя</label><input type="text"></div>
                            <div class="form-group"><label>Email</label><input type="email"></div>
                            <div class="form-group"><label>Тема</label><input type="text"></div>
                            <div class="form-group"><label>Сообщение</label><textarea rows="5"></textarea></div>
                            <button class="button button-primary btn-block">Отправить</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container"><div class="footer-bottom"><p>© 2026 JobService. Все права защищены.</p></div></div>
        </footer>
    </div>
    <script src="../js/main.js"></script>

</html>
